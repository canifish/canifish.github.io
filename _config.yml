# Site
title: My Blog
subtitle: ''
description: ''
keywords:
author: canifish
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://canifish.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: true

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Archives
archive_generator:
  per_page: 0
  yearly: true
  monthly: true
  daily: false

# Theme
theme: minimal

# Deployment
deploy:
  type: git
  repo: https://github.com/canifish/canifish.github.io.git
  branch: gh-pages
